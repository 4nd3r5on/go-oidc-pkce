openapi: 3.0.3
info:
  title: go-oidc-pkce
  description: >
    Provider-agnostic OpenID Connect (OIDC) Authorization Code Flow with PKCE
    for Go server-side web applications.
  version: 1.0.0

paths:
  /auth/login:
    get:
      summary: Initiate OIDC login
      description: >
        Starts the OIDC Authorization Code Flow with PKCE. Generates a
        cryptographically secure state (CSRF guard), nonce (replay guard), and
        code_verifier (PKCE), persists them server-side, then redirects the
        browser to the provider's authorization endpoint.
      operationId: handleLogin
      parameters:
        - name: redirect_uri
          in: query
          required: false
          description: Pre-login destination URL; the user is redirected here after successful authentication.
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the OIDC provider's authorization endpoint.
          headers:
            Location:
              description: Provider authorization URL with state, nonce, code_challenge, and code_challenge_method=S256.
              schema:
                type: string
                format: uri
        "400":
          description: redirect_uri is not a relative path (open redirect prevention).
          content:
            application/json:
              schema:
                $ref: './lib/schemas.yml#/ErrorResponse'
              examples:
                invalidRedirectURI:
                  value: {"error": "invalid redirect_uri"}
        "500":
          $ref: './lib/responses.yml#/InternalServerError'

  /auth/callback:
    get:
      summary: OIDC callback
      description: >
        Receives the authorization code from the OIDC provider and completes the
        login flow: validates the state (CSRF), exchanges the code for tokens
        (PKCE), verifies the ID token, validates the nonce (replay protection),
        provisions the user (JIT), issues an application session, then redirects
        to the original return URL or "/".
      operationId: handleCallback
      parameters:
        - name: state
          in: query
          required: true
          description: CSRF token echoed back by the provider; must match the stored value.
          schema:
            type: string
        - name: code
          in: query
          required: true
          description: Authorization code issued by the provider; exchanged for tokens.
          schema:
            type: string
      responses:
        "302":
          description: >
            Authentication successful. Redirects to the stored return_url, or
            "/" if none was provided. An application session is issued before
            the redirect (e.g., as a Set-Cookie header).
          headers:
            Location:
              description: Redirect target (return_url or "/").
              schema:
                type: string
            Set-Cookie:
              description: >
                Application session cookie (implementation-specific; set by
                SessionIssuer.Issue).
              schema:
                type: string
        "400":
          description: Bad request (missing or invalid query parameters, CSRF check failed).
          content:
            application/json:
              schema:
                $ref: './lib/schemas.yml#/ErrorResponse'
              examples:
                invalidState:
                  value: {"error": "invalid or expired state"}
                stateMissing:
                  value: {"error": "state parameter missing"}
                codeMissing:
                  value: {"error": "code parameter missing"}
        "401":
          description: ID token verification failed or nonce mismatch (replay attack detected).
          content:
            application/json:
              schema:
                $ref: './lib/schemas.yml#/ErrorResponse'
              examples:
                idTokenVerificationFailed:
                  value: {"error": "Unauthorized"}
                nonceMismatch:
                  value: {"error": "nonce mismatch"}
        "500":
          $ref: './lib/responses.yml#/InternalServerError'
